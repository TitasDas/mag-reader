name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      # test/headless.mjs launches with channel 'chrome', which uses the
      # Google Chrome preinstalled on ubuntu-latest runners.
      - run: npm run test:e2e
